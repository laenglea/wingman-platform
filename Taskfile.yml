# https://taskfile.dev

version: "3"

vars:
  REPOSITORY: ghcr.io/adrianliechti/wingman-platform

tasks:
  publish:
    cmds:
      - docker buildx build . --push --platform linux/amd64,linux/arm64 --tag {{.REPOSITORY}}

  server:
    dotenv: ['.env' ]
    
    cmds:
      - go run cmd/server/main.go

  client:
    cmds:
      - go run cmd/client/main.go
  
  run:
    cmds:
      - docker compose up --remove-orphans --force-recreate
  
  test:
    cmds:
      - task: test:base
      - task: test:features

  test:base:
    dotenv: ['.env']
    cmds:
      - go test -v ./test/errors/...
      - go test -v ./test/openai/embeddings/...
      - go test -v ./test/openai/chat/base/...
      - go test -v ./test/openai/responses/base/...
      - go test -v ./test/anthropic/base/...
      - go test -v ./test/gemini/base/...

  test:features:
    dotenv: ['.env']
    cmds:
      - go test -v ./test/openai/chat/features/...
      - go test -v ./test/openai/responses/features/...
      - go test -v ./test/anthropic/features/...
      - go test -v ./test/gemini/features/...
  
  lgtm:
    cmds:
      - docker run -it --rm -p 3000:3000 -p 4317:4317 -p 4318:4318 grafana/otel-lgtm
  
  insights:
    cmds:
      - docker run -it --rm -p 4318:4318 ghcr.io/adrianliechti/wingman-insights

  docs:render:
    desc: Render docs/architecture.html → docs/architecture.png (needs Node + playwright)
    dir: docs
    cmds:
      - npm install --no-save --no-package-lock --no-fund --no-audit playwright
      - npx --no-install playwright install chromium
      - node render.mjs
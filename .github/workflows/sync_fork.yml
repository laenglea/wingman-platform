name: Sync fork with upstream
on:
  schedule:
    - cron: '30 2 * * *'   # täglich um 02:30 UTC
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Add upstream remote
        run: git remote add upstream https://github.com/adrianliechti/wingman.git
      
      - name: Fetch upstream
        run: git fetch upstream main
      
      - name: Merge upstream changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit || {
            git checkout --theirs .
            git add -A
            git commit -m "Merge upstream/main (auto-resolved)"
          }
      
      - name: Push to fork
        run: git push origin main
      
      - name: Trigger Docker build
        run: |
          gh workflow run docker-build-latest.yml --ref main --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
